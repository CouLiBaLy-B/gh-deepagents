name: Prepare → Streamlit Community Cloud branch

# Streamlit Community Cloud deploys directly from a GitHub branch and rebuilds
# on each commit. This workflow keeps a dedicated branch (`streamlit-cloud`)
# in a layout that Cloud can read out of the box — entrypoint at the root,
# requirements.txt at the root, .streamlit/ at the root — without polluting
# the source `main` branch.

on:
  push:
    branches: [main]
    paths:
      - "src/gh_deepagent/dashboard/**"
      - "src/gh_deepagent/__init__.py"
      - "deploy/streamlit-cloud/**"
      - ".github/workflows/deploy-streamlit-cloud.yml"
  workflow_dispatch:

concurrency:
  group: deploy-streamlit-cloud
  cancel-in-progress: true

permissions:
  contents: write   # we push to a branch in the SAME repository

jobs:
  prepare-branch:
    name: Mirror dashboard into the `streamlit-cloud` branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: source

      - name: Build the cloud-ready tree
        working-directory: source
        run: |
          mkdir -p ../cloud
          # Entrypoint at the root (Streamlit Cloud looks here by default).
          cp deploy/streamlit-cloud/streamlit_app.py     ../cloud/streamlit_app.py
          cp deploy/streamlit-cloud/requirements.txt     ../cloud/requirements.txt
          mkdir -p ../cloud/.streamlit
          cp deploy/streamlit-cloud/.streamlit/config.toml ../cloud/.streamlit/config.toml
          # Source code — keep the layout the shim expects (./src/gh_deepagent).
          mkdir -p ../cloud/src
          cp -r src/gh_deepagent ../cloud/src/gh_deepagent
          find ../cloud -name "__pycache__" -type d -prune -exec rm -rf {} +
          # Helpful README so collaborators understand what this branch is.
          cat > ../cloud/README.md <<'EOF'
          # Streamlit Community Cloud branch — autogenerated

          Do **not** edit by hand. This branch is rebuilt by
          `.github/workflows/deploy-streamlit-cloud.yml` on every push to
          `main` of the source repo.

          Streamlit Community Cloud is configured to deploy this branch with
          entrypoint `streamlit_app.py`.
          EOF
          echo "::group::Tree"
          find ../cloud -maxdepth 3 -type f | sort
          echo "::endgroup::"

      - name: Push to the streamlit-cloud branch
        working-directory: cloud
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:    ${{ github.repository }}
          SHA:     ${{ github.sha }}
        run: |
          set -euo pipefail
          git init -q -b streamlit-cloud
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          # Try to base the push on the existing branch so commit history is linear.
          git fetch origin streamlit-cloud || echo "::notice::first deploy"
          if git rev-parse --verify origin/streamlit-cloud >/dev/null 2>&1; then
            git reset --soft origin/streamlit-cloud
          fi
          git add -A
          if git diff --cached --quiet; then
            echo "::notice::No changes; nothing to publish."
            exit 0
          fi
          git commit -m "ci: sync streamlit-cloud branch from ${SHA:0:7}"
          # `--force-with-lease` is safer than `--force`; refuses to overwrite
          # if someone else pushed in between (which shouldn't happen but…).
          git push --force-with-lease origin streamlit-cloud
