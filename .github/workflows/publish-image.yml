name: Publish images to GHCR

# Build & push two multi-arch Docker images to GitHub Container Registry:
#   - ghcr.io/<owner>/gh-deepagent          (full agent: webhook + worker)
#   - ghcr.io/<owner>/gh-deepagent-dashboard (Streamlit only)
#
# Tagged with the version (release), the branch (main → latest), the SHA, and
# a date. SBOM + cosign signature attached for supply-chain integrity.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false   # don't kill a release mid-flight

permissions:
  contents: read
  packages: write
  id-token: write              # cosign keyless signing via OIDC
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  prepare:
    name: Normalize image owner
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.lc.outputs.owner_lc }}
    steps:
      - id: lc
        run: |
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.image.name }} (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 30
    env:
      OWNER_LC: ${{ needs.prepare.outputs.owner_lc }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: gh-deepagent
            dockerfile: Dockerfile
            context: .
          - name: gh-deepagent-dashboard
            dockerfile: deploy/huggingface/dashboard/Dockerfile
            context: .
        platform: [linux/amd64, linux/arm64]
    outputs:
      digest-amd64: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        if: matrix.platform != 'linux/amd64'

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image.name }}
          # Tag strategy:
          #   - main branch      → :latest, :main, :sha-abc1234, :YYYYMMDD
          #   - tag v1.2.3       → :1.2.3, :1.2, :1, :latest
          #   - PR (in ci.yml)   → not pushed
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYYMMDD'}}
          labels: |
            org.opencontainers.image.title=${{ matrix.image.name }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
            org.opencontainers.image.licenses=MIT

      - name: Build & push (per-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          # We push by digest only; the manifest list is assembled by `merge` below.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image.name }},push-by-digest=true,name-canonical=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform }}
          provenance: true
          sbom: true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.image.name }}
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.image.name }}/$(echo '${{ matrix.platform }}' | tr / -)"

      - name: Compute artifact suffix
        id: artifact_suffix
        run: |
          echo "suffix=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: digests--${{ matrix.image.name }}--${{ steps.artifact_suffix.outputs.suffix }}
          path: /tmp/digests/${{ matrix.image.name }}
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Stitch manifests · ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [prepare, build]
    env:
      OWNER_LC: ${{ needs.prepare.outputs.owner_lc }}
    strategy:
      matrix:
        image: [gh-deepagent, gh-deepagent-dashboard]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: digests--${{ matrix.image }}--*
          merge-multiple: true
          path: /tmp/digests/${{ matrix.image }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create & push multi-arch manifest list
        working-directory: /tmp/digests/${{ matrix.image }}
        run: |
          set -euo pipefail
          # Read each digest into a `--amend` flag for imagetools create.
          TAGS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<<'${{ steps.meta.outputs.json }}')
          DIGESTS=$(printf "${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}@%s " $(cat *))
          docker buildx imagetools create $TAGS $DIGESTS

      - name: Inspect
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}

  sign-and-attest:
    name: Cosign + provenance · ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [prepare, merge]
    env:
      OWNER_LC: ${{ needs.prepare.outputs.owner_lc }}
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        image: [gh-deepagent, gh-deepagent-dashboard]
    steps:
      - uses: sigstore/cosign-installer@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve current digest of :latest (or release tag)
        id: digest
        run: |
          REF=${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}:${GITHUB_REF_NAME#refs/tags/}
          if ! docker buildx imagetools inspect "$REF" >/dev/null 2>&1; then
            REF=${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}:latest
          fi
          DIG=$(docker buildx imagetools inspect "$REF" --format '{{json .Manifest}}' | jq -r .digest)
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "digest=$DIG" >> $GITHUB_OUTPUT

      - name: Cosign sign (keyless, GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}@${{ steps.digest.outputs.digest }}

      - name: Generate SBOM attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
