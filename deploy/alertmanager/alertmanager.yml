global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"

route:
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-default
  routes:
    - matchers: [severity="page"]
      receiver: pagerduty
      continue: true
    - matchers: [severity=~"warning|critical"]
      receiver: slack-default
    - matchers: [severity="info"]
      receiver: slack-info

receivers:
  - name: slack-default
    slack_configs:
      - channel: "#gh-deepagent-alerts"
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |-
          *Service:* {{ .CommonLabels.service }}
          *Severity:* {{ .CommonLabels.severity }}
          {{ range .Alerts }}
          • *{{ .Annotations.summary }}*
            {{ .Annotations.description }}
            {{ if .Annotations.runbook }}<{{ .Annotations.runbook }}|Runbook>{{ end }}
          {{ end }}

  - name: slack-info
    slack_configs:
      - channel: "#gh-deepagent-info"
        send_resolved: false
        title: '[INFO] {{ .CommonLabels.alertname }}'

  - name: pagerduty
    pagerduty_configs:
      - service_key: "${PAGERDUTY_SERVICE_KEY}"
        description: "{{ .CommonLabels.alertname }} — {{ .CommonAnnotations.summary }}"
        details:
          service:  "{{ .CommonLabels.service }}"
          severity: "{{ .CommonLabels.severity }}"
          summary:  "{{ .CommonAnnotations.summary }}"

inhibit_rules:
  # If the webhook is down, don't also page about high error rate.
  - source_matchers: [alertname="DeepagentWebhookDown"]
    target_matchers: [alertname=~"DeepagentJobFailureRateHigh|DeepagentToolErrorSpike"]
    equal: [service]
