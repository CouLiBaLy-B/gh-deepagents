global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: gh-deepagent
    metrics_path: /metrics
    static_configs:
      - targets: ["gh-deepagent:8080"]
        labels: { service: "gh-deepagent" }
