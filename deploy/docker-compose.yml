version: "3.9"

# Full stack: webhook + N workers + Redis + Ollama + Prometheus + Grafana + Caddy.
# Minimal mode: docker compose up gh-deepagent gh-deepagent-worker redis

x-app-env: &app-env
  DEEPAGENT_MODEL: ${DEEPAGENT_MODEL:-ollama:qwen2.5-coder:14b}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  DEEPAGENT_GITHUB_APP_ID: ${DEEPAGENT_GITHUB_APP_ID:-}
  DEEPAGENT_GITHUB_APP_PRIVATE_KEY_PATH: ${DEEPAGENT_GITHUB_APP_PRIVATE_KEY_PATH:-}
  DEEPAGENT_TRIGGER_LABEL: ${DEEPAGENT_TRIGGER_LABEL:-deepagent}
  DEEPAGENT_REVIEW_LABEL: ${DEEPAGENT_REVIEW_LABEL:-deepagent-review}
  DEEPAGENT_COMMAND_PREFIX: ${DEEPAGENT_COMMAND_PREFIX:-/deepagent}
  DEEPAGENT_BACKEND: ${DEEPAGENT_BACKEND:-local}
  DAYTONA_API_KEY: ${DAYTONA_API_KEY:-}
  MODAL_TOKEN_ID: ${MODAL_TOKEN_ID:-}
  MODAL_TOKEN_SECRET: ${MODAL_TOKEN_SECRET:-}
  RUNLOOP_API_KEY: ${RUNLOOP_API_KEY:-}
  DEEPAGENT_WEBHOOK_SECRET: ${DEEPAGENT_WEBHOOK_SECRET:?webhook secret required}
  DEEPAGENT_REDIS_URL: redis://redis:6379/0
  DEEPAGENT_MAX_ATTEMPTS: ${DEEPAGENT_MAX_ATTEMPTS:-3}
  DEEPAGENT_MAX_TURNS: ${DEEPAGENT_MAX_TURNS:-40}
  DEEPAGENT_LOG_LEVEL: ${DEEPAGENT_LOG_LEVEL:-INFO}
  DEEPAGENT_JSON_LOGS: "1"
  LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
  LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
  LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-gh-deepagent}

services:
  gh-deepagent:
    build: { context: .., dockerfile: Dockerfile }
    container_name: gh-deepagent
    restart: unless-stopped
    ports: ["8080:8080"]
    environment: *app-env
    volumes:
      - workdir:/var/lib/gh-deepagent
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  gh-deepagent-worker:
    build: { context: .., dockerfile: Dockerfile }
    container_name: gh-deepagent-worker
    restart: unless-stopped
    command: ["gh-deepagent", "worker", "--workers", "2"]
    environment: *app-env
    volumes:
      - workdir:/var/lib/gh-deepagent
    depends_on:
      redis:
        condition: service_healthy
      gh-deepagent:
        condition: service_started
    # Scale: `docker compose up --scale gh-deepagent-worker=4`

  gh-deepagent-dashboard:
    build: { context: .., dockerfile: Dockerfile }
    container_name: gh-deepagent-dashboard
    restart: unless-stopped
    command: ["gh-deepagent", "dashboard", "--host", "0.0.0.0", "--port", "8501"]
    environment:
      DEEPAGENT_API_URL: http://gh-deepagent:8080
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DEEPAGENT_GITHUB_APP_ID: ${DEEPAGENT_GITHUB_APP_ID:-}
      DEEPAGENT_GITHUB_APP_PRIVATE_KEY_PATH: ${DEEPAGENT_GITHUB_APP_PRIVATE_KEY_PATH:-}
    ports: ["8501:8501"]
    depends_on:
      gh-deepagent:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: deepagent-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices: [{driver: nvidia, count: all, capabilities: [gpu]}]

  # ---------- Observability ----------
  prometheus:
    image: prom/prometheus:latest
    container_name: deepagent-prometheus
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prom_data:/prometheus
    depends_on: [gh-deepagent, alertmanager]

  alertmanager:
    image: prom/alertmanager:latest
    container_name: deepagent-alertmanager
    restart: unless-stopped
    ports: ["9093:9093"]
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PAGERDUTY_SERVICE_KEY: ${PAGERDUTY_SERVICE_KEY:-}
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - am_data:/alertmanager

  # OpenTelemetry trace backend (Tempo).
  tempo:
    image: grafana/tempo:latest
    container_name: deepagent-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    profiles: [observability]

  grafana:
    image: grafana/grafana:latest
    container_name: deepagent-grafana
    restart: unless-stopped
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [gh-deepagent]
    profiles: [prod]   # only started with `--profile prod`

volumes:
  workdir:
  ollama_data:
  redis_data:
  prom_data:
  am_data:
  tempo_data:
  grafana_data:
  caddy_data:
  caddy_config:
